<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VMS Requests · CompScience Internal</title>
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-green: #00C57B;
      --blue-midnight: #01232C;
      --grey-100: #F8F9FA;
      --grey-300: #E1E5E5;
      --grey-500: #949899;
      --grey-600: #4E4E4E;
      --black: #1A1A1A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Spline Sans", sans-serif; background: var(--grey-100); color: var(--black); padding: 32px 24px; }
    .wrap { max-width: 1400px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    h1 { font-size: 22px; font-weight: 600; color: var(--blue-midnight); }
    .sub { font-size: 13px; color: var(--grey-500); }
    .back { font-size: 13px; color: var(--grey-600); text-decoration: none; }
    .back:hover { color: var(--brand-green); }

    .status-bar { background: white; border: 1px solid var(--grey-300); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; display: flex; gap: 24px; font-size: 13px; flex-wrap: wrap; }
    .status-bar span strong { color: var(--blue-midnight); font-weight: 600; }

    .table-wrap { background: white; border: 1px solid var(--grey-300); border-radius: 8px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: auto; }
    /* Default: allow wrapping. Opt-in to nowrap with .nowrap on cells that
       need it (dates, ids, numbers, pills). This is the single biggest
       lever against the "always scrolls horizontally" problem. */
    th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--grey-300); vertical-align: top; }
    th.nowrap, td.nowrap { white-space: nowrap; }
    th { background: var(--grey-100); color: var(--grey-600); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; position: sticky; top: 0; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #FAFBFB; }
    td.num { font-family: "SFMono-Regular", Menlo, monospace; font-size: 12px; color: var(--grey-600); }
    .muted { color: var(--grey-500); }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; background: var(--grey-100); color: var(--grey-600); border: 1px solid var(--grey-300); white-space: nowrap; }
    .pill.pending { background: #FFF8E5; color: #8A6D00; border-color: #F6E6A3; }
    .pill.task-pending { background: #DBEAFE; color: #1E40AF; border-color: #93C5FD; }
    .pill.task-done { background: #D1FAE5; color: #065F46; border-color: #6EE7B7; }

    /* Status cell — stacks the submission status pill over the verified pill. */
    .status-stack { display: flex; flex-direction: column; gap: 4px; align-items: flex-start; }

    /* HubSpot cell — compact two-row stack: contact on top, deal below.
       Small grey label on the left so the two links are immediately
       distinguishable without needing separate columns. */
    .hs-stack { display: flex; flex-direction: column; gap: 4px; line-height: 1.2; }
    .hs-row { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .hs-row .hs-label {
      font-size: 10px;
      color: var(--grey-500);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      min-width: 42px;
    }
    .btn-mini {
      padding: 1px 5px;
      border: 1px solid var(--grey-300);
      background: white;
      border-radius: 4px;
      font-size: 10px;
      cursor: pointer;
      font-family: inherit;
      color: var(--grey-500);
    }
    .btn-mini:hover { border-color: var(--brand-green); color: var(--brand-green); }

    /* Customer cell — company + contact person + email, stacked. Capped
       width so long emails don't stretch the whole table; they wrap
       naturally inside the max-width. */
    .customer-cell { max-width: 260px; }
    .cust-company { font-weight: 600; color: var(--blue-midnight); }
    .cust-person { font-size: 12px; color: var(--grey-600); margin-top: 2px; }
    .cust-email { font-size: 12px; margin-top: 2px; word-break: break-all; }
    .company-src {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 6px;
      border-radius: 4px;
      background: var(--grey-100);
      border: 1px solid var(--grey-300);
      color: var(--grey-600);
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      vertical-align: middle;
      cursor: help;
    }

    /* Team cell — three mini rows (CSE / CSM / BD). Empty roles drop out. */
    .team-stack { display: flex; flex-direction: column; gap: 2px; line-height: 1.3; }
    .team-row { display: flex; gap: 6px; font-size: 12px; }
    .team-label {
      font-size: 10px;
      color: var(--grey-500);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      min-width: 28px;
      padding-top: 1px;
    }

    .empty, .error { padding: 40px; text-align: center; color: var(--grey-500); font-size: 14px; }
    .error { color: #991B1B; }

    details.row-details summary { cursor: pointer; color: var(--grey-500); font-size: 12px; }
    details.row-details summary:hover { color: var(--brand-green); }
    details.row-details[open] summary { margin-bottom: 8px; }
    .kv { display: grid; grid-template-columns: max-content 1fr; gap: 4px 16px; font-size: 12px; margin-top: 6px; }
    .kv dt { color: var(--grey-500); }
    .kv dd { color: var(--black); word-break: break-word; }

    /* Action buttons */
    .btn-sm { padding: 4px 10px; border-radius: 5px; border: 1px solid var(--grey-300); background: white; font-size: 12px; cursor: pointer; font-family: inherit; }
    .btn-sm:hover { border-color: var(--brand-green); color: var(--brand-green); }
    .btn-danger { color: #991B1B; border-color: #FCA5A5; }
    .btn-danger:hover { background: #FEE2E2; border-color: #EF4444; color: #991B1B; }
    .hs-link { font-size: 12px; color: var(--brand-green); text-decoration: none; }
    .hs-link:hover { text-decoration: underline; }
    .linear-link { font-size: 12px; color: #5E6AD2; text-decoration: none; font-family: "SFMono-Regular", Menlo, monospace; }
    .linear-link:hover { text-decoration: underline; }
    .hs-input { width: 180px; padding: 4px 8px; border: 1px solid var(--grey-300); border-radius: 5px; font-size: 12px; font-family: inherit; }
    .hs-input:focus { outline: none; border-color: var(--brand-green); }

    /* Delete confirmation dialog */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .dialog { background: white; border-radius: 10px; padding: 24px; width: min(400px, 90vw); box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    .dialog h3 { font-size: 16px; margin-bottom: 12px; color: #991B1B; }
    .dialog p { font-size: 13px; color: var(--grey-600); margin-bottom: 16px; }
    .dialog input { width: 100%; padding: 8px 12px; border: 1.5px solid var(--grey-300); border-radius: 6px; font-size: 14px; font-family: monospace; box-sizing: border-box; }
    .dialog input:focus { outline: none; border-color: #EF4444; }
    .dialog-btns { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
    .dialog-btns button { padding: 8px 16px; border-radius: 6px; border: none; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 500; }
    .dialog-btns .cancel { background: var(--grey-100); color: var(--grey-600); }
    .dialog-btns .confirm { background: #EF4444; color: white; opacity: 0.4; pointer-events: none; }
    .dialog-btns .confirm.active { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>VMS Device Requests</h1>
        <p class="sub">Submissions from compscience.support/vms-request</p>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        <button class="btn-sm" id="refreshTasksBtn" title="Re-check HubSpot for every task-pending row">Refresh task status</button>
        <a class="back" href="/">&larr; Internal home</a>
      </div>
    </header>

    <div class="status-bar" id="statusBar">
      <span>Loading&hellip;</span>
    </div>

    <div class="table-wrap" id="tableWrap">
      <div class="empty">Loading requests&hellip;</div>
    </div>
  </div>

<script>
const API_BASE = '/api/vms-requests';
const HS_PORTAL = '7917625';
let allRows = [];

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleString(undefined, { year: 'numeric', month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function extractHsContactId(input) {
  if (!input) return null;
  const m = input.match(/record\/[\d-]+\/(\d+)/);
  if (m) return m[1];
  if (/^\d+$/.test(input.trim())) return input.trim();
  return null;
}

function hsUrl(contactId) {
  return `https://app.hubspot.com/contacts/${HS_PORTAL}/record/0-1/${contactId}`;
}

function hsDealUrl(dealId) {
  // Deal object type is 0-3 in HubSpot.
  return `https://app.hubspot.com/contacts/${HS_PORTAL}/record/0-3/${dealId}`;
}

function linearIdentFromUrl(url) {
  if (!url) return null;
  const m = url.match(/\/issue\/([A-Z]+-\d+)/);
  return m ? m[1] : null;
}

function renderLinearCell(r) {
  if (!r.linear_issue_url) return '<span class="muted">—</span>';
  const ident = linearIdentFromUrl(r.linear_issue_url) || 'open';
  return `<a class="linear-link" href="${esc(r.linear_issue_url)}" target="_blank" title="Open in Linear">${esc(ident)}</a>`;
}

function renderStatus(rows) {
  const byStatus = rows.reduce((acc, r) => {
    const k = r.status || 'unknown';
    acc[k] = (acc[k] || 0) + 1;
    return acc;
  }, {});
  const verified = rows.filter(r => r.email_verified_at).length;
  const parts = [`<span><strong>${rows.length}</strong> total</span>`];
  parts.push(`<span><strong>${verified}</strong> verified</span>`);
  for (const [k, v] of Object.entries(byStatus)) {
    parts.push(`<span><strong>${v}</strong> ${esc(k)}</span>`);
  }
  document.getElementById('statusBar').innerHTML = parts.join('');
}

function renderHsContact(r) {
  const id = r.hs_contact_id;
  if (!id) {
    return `<button class="btn-mini" onclick="promptHs('${esc(r.confirmation_number)}','')">link</button>`;
  }
  return `<a class="hs-link" href="${esc(hsUrl(id))}" target="_blank" title="Open contact in HubSpot">${esc(id)}</a>
          <button class="btn-mini" onclick="promptHs('${esc(r.confirmation_number)}','${esc(id)}')" title="Edit contact id">&#9998;</button>`;
}

function renderHsDeal(r) {
  const id = r.hs_deal_id;
  if (!id) {
    return `<button class="btn-mini" onclick="promptHsDeal('${esc(r.confirmation_number)}','')">link</button>`;
  }
  return `<a class="hs-link" href="${esc(hsDealUrl(id))}" target="_blank" title="Open deal in HubSpot">${esc(id)}</a>
          <button class="btn-mini" onclick="promptHsDeal('${esc(r.confirmation_number)}','${esc(id)}')" title="Edit deal id">&#9998;</button>`;
}

function renderHubspotCell(r) {
  return `
    <div class="hs-stack">
      <div class="hs-row"><span class="hs-label">Contact</span>${renderHsContact(r)}</div>
      <div class="hs-row"><span class="hs-label">Deal</span>${renderHsDeal(r)}</div>
    </div>
  `;
}

function renderStatusCell(r) {
  const statusKey = (r.status || '').toLowerCase();
  const statusClass = statusKey ? `pill ${statusKey}` : 'pill';
  const verified = r.email_verified_at
    ? '<span class="pill" style="background:#D1FAE5;color:#065F46;border-color:#6EE7B7">Verified</span>'
    : '<span class="pill" style="background:#FEE2E2;color:#991B1B;border-color:#FCA5A5">Pending</span>';
  return `<div class="status-stack">
    <span class="${statusClass}">${esc(r.status || '—')}</span>
    ${verified}
  </div>`;
}

function renderCustomerCell(r) {
  const name = [r.first_name, r.last_name].filter(Boolean).join(' ');
  const person = [name || '—', r.job_title].filter(Boolean).join(' · ');
  const email = r.email
    ? `<a href="mailto:${esc(r.email)}">${esc(r.email)}</a>`
    : '<span class="muted">—</span>';

  // Company display priority: the deal's associated company name wins
  // when a deal is linked (deal_company_name), falling back to the
  // user-typed `company` otherwise. When both exist and differ, tooltip
  // surfaces the typed value so admins can see the original submission.
  const typed = r.company || '';
  const fromDeal = r.deal_company_name || '';
  const shown = fromDeal || typed || '—';
  const differs = fromDeal && typed && fromDeal.trim() !== typed.trim();
  const title = differs
    ? ` title="From linked deal. User typed: ${esc(typed)}"`
    : '';
  const badge = differs
    ? ' <span class="company-src" title="Shown from linked deal">deal</span>'
    : '';

  return `<div class="customer-cell">
    <div class="cust-company"${title}>${esc(shown)}${badge}</div>
    <div class="cust-person">${esc(person)}</div>
    <div class="cust-email">${email}</div>
  </div>`;
}

function renderTeamCell(r) {
  const row = (label, v) => v
    ? `<div class="team-row"><span class="team-label">${label}</span><span>${esc(v)}</span></div>`
    : '';
  const rows = [
    row('CSE', r.deal_cse_name),
    row('CSM', r.deal_csm_name),
    row('BD',  r.deal_bd_name),
  ].filter(Boolean);
  return rows.length ? `<div class="team-stack">${rows.join('')}</div>` : '<span class="muted">—</span>';
}

function renderTable(rows) {
  const wrap = document.getElementById('tableWrap');
  if (!rows.length) {
    wrap.innerHTML = '<div class="empty">No VMS requests yet.</div>';
    return;
  }
  const head = `
    <thead>
      <tr>
        <th class="nowrap">Submitted</th>
        <th class="nowrap">Conf #</th>
        <th>Status</th>
        <th>HubSpot</th>
        <th>Linear</th>
        <th>Customer</th>
        <th>Team</th>
        <th class="nowrap">Tracking</th>
        <th>Location</th>
        <th>Details</th>
        <th></th>
      </tr>
    </thead>
  `;
  const body = rows.map(r => `
    <tr id="row-${esc(r.confirmation_number)}">
      <td class="nowrap">${esc(fmtDate(r.submitted_at))}</td>
      <td class="num nowrap">${esc(r.confirmation_number)}</td>
      <td>${renderStatusCell(r)}</td>
      <td>${renderHubspotCell(r)}</td>
      <td class="nowrap">${renderLinearCell(r)}</td>
      <td>${renderCustomerCell(r)}</td>
      <td>${renderTeamCell(r)}</td>
      <td class="num nowrap">${r.tracking_number ? esc(r.tracking_number) : '<span class="muted">—</span>'}</td>
      <td>${esc([r.city, r.state].filter(Boolean).join(', ') || '—')}</td>
      <td>
        <details class="row-details">
          <summary>More</summary>
          <dl class="kv">
            <dt>Phone</dt><dd>${esc(r.phone || '—')}</dd>
            <dt>Site (deal)</dt><dd>${r.location_name ? esc(r.location_name) + (r.hs_location_id ? ` <span class="muted">· ${esc(r.hs_location_id)}</span>` : '') : '<span class="muted">—</span>'}</dd>
            <dt>Site name (typed)</dt><dd>${esc(r.site_name || '—')}</dd>
            <dt>Street</dt><dd>${esc([r.street, r.suite].filter(Boolean).join(', '))}</dd>
            <dt>ZIP / Country</dt><dd>${esc([r.zip, r.country].filter(Boolean).join(' · '))}</dd>
            <dt>Network env</dt><dd>${esc(r.network_environment || '—')}</dd>
            <dt>Special instructions</dt><dd>${esc(r.special_instructions || '—')}</dd>
            <dt>ToS version</dt><dd class="num">${esc(r.tos_version || '—')}</dd>
            <dt>ToS accepted at</dt><dd>${esc(fmtDate(r.tos_accepted_at))}</dd>
            <dt>Acceptance ID</dt><dd class="num">${esc(r.acceptance_id || '—')}</dd>
          </dl>
        </details>
      </td>
      <td class="nowrap"><button class="btn-sm btn-danger" onclick="confirmDelete('${esc(r.confirmation_number)}','${esc(r.company)}')">Delete</button></td>
    </tr>
  `).join('');
  wrap.innerHTML = `<table>${head}<tbody>${body}</tbody></table>`;
}

// ── HubSpot link ──────────────────────────────────────────────────────────
async function promptHs(confNum, current) {
  const input = prompt(
    'Paste a HubSpot contact URL or ID:\n\n' +
    'Example: https://app.hubspot.com/contacts/.../record/0-1/215810181528\n' +
    'Or just: 215810181528',
    current || ''
  );
  if (input === null) return; // cancelled
  const id = extractHsContactId(input);
  if (!id) { alert('Could not extract a HubSpot contact ID from that input.'); return; }
  await patchVms(confNum, { hs_contact_id: id });
}

// Mirror of promptHs for deals. Empty input unlinks. Backend will
// resolve CSE/CSM/BD from the deal and populate the Team cell on
// success. The same extractHsContactId regex handles deal URLs too
// since it matches any /record/<type>/<id> suffix.
async function promptHsDeal(confNum, current) {
  const input = prompt(
    'Paste a HubSpot deal URL or ID:\n\n' +
    'Example: https://app.hubspot.com/contacts/.../record/0-3/50443099661\n' +
    'Or just: 50443099661\n\n' +
    '(Leave empty to unlink.)',
    current || ''
  );
  if (input === null) return; // cancelled
  const trimmed = input.trim();
  let value = null;
  if (trimmed) {
    value = extractHsContactId(trimmed);
    if (!value) { alert('Could not extract a HubSpot deal ID from that input.'); return; }
  }
  await patchVms(confNum, { hs_deal_id: value });
}

async function patchVms(confNum, body) {
  try {
    const res = await fetch(`${API_BASE}/${confNum}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const updated = await res.json();
    allRows = allRows.map(r => r.confirmation_number === confNum ? updated : r);
    renderTable(allRows);
  } catch (e) { alert('Failed to save: ' + e.message); }
}

// ── Delete with "type DELETE" confirmation ─────────────────────────────────
function confirmDelete(confNum, company) {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="dialog">
      <h3>Delete VMS Request</h3>
      <p>This will permanently delete the request from <strong>${esc(company)}</strong>
         (<strong>${esc(confNum)}</strong>). This cannot be undone.</p>
      <p style="font-size:12px;color:var(--grey-500);margin-bottom:8px">Type <strong>DELETE</strong> to confirm:</p>
      <input id="deleteInput" autocomplete="off" spellcheck="false" placeholder="DELETE">
      <div class="dialog-btns">
        <button class="cancel" id="deleteCancel">Cancel</button>
        <button class="confirm" id="deleteConfirm">Delete Request</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  const inp = document.getElementById('deleteInput');
  const btn = document.getElementById('deleteConfirm');
  inp.focus();
  inp.addEventListener('input', () => {
    btn.classList.toggle('active', inp.value.trim() === 'DELETE');
  });
  document.getElementById('deleteCancel').onclick = () => overlay.remove();
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  btn.onclick = async () => {
    if (inp.value.trim() !== 'DELETE') return;
    btn.textContent = 'Deleting…';
    btn.style.pointerEvents = 'none';
    try {
      const res = await fetch(`${API_BASE}/${confNum}`, { method: 'DELETE' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allRows = allRows.filter(r => r.confirmation_number !== confNum);
      renderStatus(allRows);
      renderTable(allRows);
    } catch (e) { alert('Delete failed: ' + e.message); }
    overlay.remove();
  };
}

// ── Refresh task status ───────────────────────────────────────────────────
async function refreshTasks() {
  const btn = document.getElementById('refreshTasksBtn');
  const original = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Checking HubSpot…';
  try {
    const res = await fetch(`${API_BASE}/reconcile-tasks`, { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const summary = await res.json();
    await load();
    btn.textContent = summary.changed_count
      ? `${summary.changed_count} moved to task-done`
      : `Checked ${summary.checked} · no changes`;
    setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2500);
  } catch (e) {
    btn.textContent = 'Refresh failed';
    setTimeout(() => { btn.textContent = original; btn.disabled = false; }, 2500);
  }
}

// ── Initial load ──────────────────────────────────────────────────────────
async function load() {
  try {
    const res = await fetch(API_BASE + '?limit=500');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allRows = await res.json();
    allRows.sort((a, b) => (b.submitted_at || '').localeCompare(a.submitted_at || ''));
    renderStatus(allRows);
    renderTable(allRows);
  } catch (e) {
    document.getElementById('statusBar').innerHTML = `<span class="error">Failed to load: ${esc(e.message)}</span>`;
    document.getElementById('tableWrap').innerHTML = `<div class="error">Couldn't reach the API. Check cse-platform logs.</div>`;
  }
}

document.getElementById('refreshTasksBtn').addEventListener('click', refreshTasks);
load();
</script>
</body>
</html>
