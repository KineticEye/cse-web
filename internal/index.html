<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CompScience Internal</title>
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-green: #00C57B;
      --blue-midnight: #01232C;
      --grey-100: #F8F9FA;
      --grey-300: #E1E5E5;
      --grey-500: #949899;
      --grey-600: #4E4E4E;
      --black: #1A1A1A;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Spline Sans", sans-serif; background: var(--grey-100); color: var(--black); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 480px; padding: 40px 24px; text-align: center; }
    h1 { font-size: 24px; font-weight: 600; color: var(--blue-midnight); margin-bottom: 8px; }
    p { font-size: 14px; color: var(--grey-500); margin-bottom: 32px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    a {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 14px 24px; border: 1px solid var(--grey-300); border-radius: 8px;
      background: white; text-decoration: none; font-size: 14px; font-weight: 500;
      color: var(--grey-600); transition: all 0.2s;
    }
    a:hover { border-color: var(--brand-green); color: var(--brand-green); }
    a svg { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>CompScience Internal</h1>
    <p>Internal tools and resources</p>
    <div class="links">
      <a href="/upload">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        File Upload
      </a>
      <a href="/vms-requests.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3v4"/><path d="M8 3v4"/><path d="M2 13h20"/></svg>
        VMS Requests
      </a>
      <a href="/mcp-tokens.html">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        MCP Tokens
      </a>
      <a href="https://platform.compscience.support/tooling" target="_blank" rel="noopener noreferrer">

      <a href="https://compscience.support/" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        External Site
      </a>
    </div>
  </div>
</body>
</html>
